services:
  - type: web
    name: inkflow-comics
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter server db:generate && pnpm build
    preDeployCommand: pnpm --filter server db:deploy
    startCommand: pnpm --filter server start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.14.0
      - key: VITE_API_URL
        value: /api
      - key: DATABASE_URL
        fromDatabase:
          name: inkflow-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-1
      - key: OPENAI_IMAGE_QUALITY
        value: medium
      - key: OPENAI_IMAGE_MODERATION
        value: low
      - key: OPENAI_TIMEOUT_MS
        value: "120000"
    disk:
      name: inkflow-uploads
      mountPath: /opt/render/project/src/server/uploads/comics
      sizeGB: 1

databases:
  - name: inkflow-postgres
    plan: basic-256mb
    region: frankfurt
    databaseName: inkflow
    user: inkflow
